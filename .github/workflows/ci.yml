name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  api-test:
    name: Go API
    runs-on: ubuntu-latest
    env:
      GOWORK: ${{ github.workspace }}/go.work
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99
        with:
          version: '1.47.2'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobufs
        run: buf generate

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.25.10'
          cache-dependency-path: |
            services/api/go.sum
            packages/contracts/go.sum

      - name: Download dependencies
        run: go mod download -x
        working-directory: services/api

      - name: Lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa
        with:
          version: v2.7.2
          args: ./services/api/...

      - name: Test
        run: go test ./... -coverprofile=coverage.out
        working-directory: services/api

      - name: Upload API Coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          files: ./services/api/coverage.out
          flags: api
          name: api-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Security Check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
        working-directory: services/api

      - name: Build
        run: go build -o bin/api cmd/api/main.go
        working-directory: services/api

  bot-test:
    name: TypeScript Bot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/bot
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99
        with:
          version: '1.47.2'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobufs
        run: buf generate
        working-directory: .

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.5'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run test:coverage

      - name: Upload Bot Coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          files: ./services/bot/coverage/lcov.info
          flags: bot
          name: bot-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: bun run build

  cf-test:
    name: CF Workers (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b)
        run: npx tsc -b packages/cf-shared services/cf-api services/cf-bot services/cf-worker

      - name: Test
        run: npm test

  cf-deploy-dev:
    name: Deploy CF Workers (dev)
    if: github.ref == 'refs/heads/main'
    needs: [cf-test]
    runs-on: ubuntu-latest
    concurrency: dev-deploy
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Deploy cf-shared built output
        run: npx tsc -b packages/cf-shared
      - name: Deploy cf-api
        run: npx wrangler deploy --env dev
        working-directory: services/cf-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy cf-bot
        run: npx wrangler deploy --env dev
        working-directory: services/cf-bot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy cf-worker
        run: npx wrangler deploy --env dev
        working-directory: services/cf-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  cf-deploy-prod:
    name: Deploy CF Workers (prod)
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-pre') && !contains(github.ref, '-rc') && !contains(github.ref, '-beta')
    needs: [cf-test]
    runs-on: ubuntu-latest
    concurrency: prod-deploy
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Deploy cf-shared built output
        run: npx tsc -b packages/cf-shared
      - name: Deploy cf-api (prod)
        run: npx wrangler deploy --env production
        working-directory: services/cf-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy cf-bot (prod)
        run: npx wrangler deploy --env production
        working-directory: services/cf-bot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy cf-worker (prod)
        run: npx wrangler deploy --env production
        working-directory: services/cf-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
