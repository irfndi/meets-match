name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    name: CF Workers (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Set up Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate version files
        run: pnpm exec tsx scripts/generate-version.ts

      - name: Fast type check (tsgo)
        run: pnpm typecheck:fast
        continue-on-error: true

      - name: Safe type check (tsc)
        run: pnpm typecheck:safe

      - name: Test
        run: pnpm test

  deploy-dev:
    name: Deploy (dev)
    if: github.ref == 'refs/heads/main' || (startsWith(github.ref, 'refs/tags/v') && (contains(github.ref, '-pre') || contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-snapshot') || contains(github.ref, '-nightly') || contains(github.ref, '-canary') || contains(github.ref, '-dev')))
    needs: [test]
    runs-on: ubuntu-latest
    concurrency: dev-deploy
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - run: pnpm install --frozen-lockfile

      - name: Build cf-shared
        run: pnpm exec tsc -b packages/cf-shared

      - name: Generate version files
        run: pnpm exec tsx scripts/generate-version.ts
        env:
          CF_ENV: development

      - name: Apply D1 migrations (dev)
        run: pnpm exec wrangler d1 migrations apply meetsmatch-dev --env dev --remote
        working-directory: services/cf-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # D1 migrations require account-level D1 permissions on the API token.
        # If this fails with code 7403, the token lacks D1 access; deployments
        # will still proceed but migrations must be run manually until fixed.
        continue-on-error: true

      - name: Deploy cf-api
        run: pnpm exec wrangler deploy --env dev
        working-directory: services/cf-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy cf-tail
        run: pnpm exec wrangler deploy --env dev
        working-directory: services/cf-tail
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy cf-bot
        run: pnpm exec wrangler deploy --env dev
        working-directory: services/cf-bot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy cf-worker
        run: pnpm exec wrangler deploy --env dev
        working-directory: services/cf-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-prod:
    name: Deploy CF Workers (prod)
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-pre') && !contains(github.ref, '-rc') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-snapshot') && !contains(github.ref, '-nightly') && !contains(github.ref, '-canary') && !contains(github.ref, '-dev')
    needs: [test]
    runs-on: ubuntu-latest
    concurrency: prod-deploy
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - run: pnpm install --frozen-lockfile

      - name: Build cf-shared
        run: pnpm exec tsc -b packages/cf-shared

      - name: Generate version files
        run: pnpm exec tsx scripts/generate-version.ts
        env:
          CF_ENV: production

      - name: Apply D1 migrations (prod)
        run: pnpm exec wrangler d1 migrations apply meetsmatch --env production --remote
        working-directory: services/cf-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # D1 migrations require account-level D1 permissions on the API token.
        # If this fails with code 7403, the token lacks D1 access; deployments
        # will still proceed but migrations must be run manually until fixed.
        continue-on-error: true

      - name: Deploy cf-api (prod)
        run: pnpm exec wrangler deploy --env production
        working-directory: services/cf-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy cf-tail (prod)
        run: pnpm exec wrangler deploy --env production
        working-directory: services/cf-tail
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy cf-bot (prod)
        run: pnpm exec wrangler deploy --env production
        working-directory: services/cf-bot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy cf-worker (prod)
        run: pnpm exec wrangler deploy --env production
        working-directory: services/cf-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
