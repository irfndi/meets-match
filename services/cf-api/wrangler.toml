name = "meetsmatch-api"
main = "src/index.ts"
compatibility_date = "2024-05-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "meetsmatch"
database_id = "99d50fd1-a134-4bc6-8c2f-92cba3e437ea"

# KV Namespace for caching
[[kv_namespaces]]
binding = "KV"
id = "d1c3b0d80d3743708f441f39034a308f"

# Queue producer for notifications
[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "notification-queue"

# Service Binding — this service is exported as "api"
# Other services import it via [[services]] in their wrangler.toml

[vars]
ENVIRONMENT = "development"
ENABLE_SENTRY = "false"

# Cron triggers are handled by cf-worker, not cf-api

# Secrets (set via wrangler secret put or .dev.vars):
# SENTRY_DSN
# SENTRY_ENVIRONMENT
# SENTRY_RELEASE

[env.dev]
name = "meetsmatch-api-dev"
[[env.dev.d1_databases]]
binding = "DB"
database_name = "meetsmatch-dev"
database_id = "ee59fbbe-3cb1-4afc-9933-521783d08cde"
[[env.dev.kv_namespaces]]
binding = "KV"
id = "a0d31ccf20fd44b794e3d4e4298efc4e"
[[env.dev.queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "notification-queue-dev"

[env.production]
name = "meetsmatch-api"



[observability.logs]
enabled = true
invocation_logs = true
