name = "meetsmatch-bot"
main = "src/index.ts"
compatibility_date = "2024-05-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "meetsmatch"
database_id = "99d50fd1-a134-4bc6-8c2f-92cba3e437ea"

# KV Namespace for session caching
[[kv_namespaces]]
binding = "KV"
id = "d1c3b0d80d3743708f441f39034a308f"

# Service Binding — this service is exported as "bot"
# Other services import it via [[services]] in their wrangler.toml

# Service Binding to API
[[services]]
binding = "API_SERVICE"
service = "meetsmatch-api"

[vars]
ENVIRONMENT = "development"
ENABLE_SENTRY = "false"

# Secrets (set via wrangler secret put or .dev.vars):
# BOT_TOKEN
# TELEGRAM_WEBHOOK_SECRET
# SENTRY_DSN
# SENTRY_ENVIRONMENT
# SENTRY_RELEASE

# ── Dev environment (auto-deploy on merge to main) ──
[env.dev]
name = "meetsmatch-bot-dev"
[[env.dev.d1_databases]]
binding = "DB"
database_name = "meetsmatch-dev"
database_id = "ee59fbbe-3cb1-4afc-9933-521783d08cde"
[[env.dev.kv_namespaces]]
binding = "KV"
id = "a0d31ccf20fd44b794e3d4e4298efc4e"
[[env.dev.services]]
binding = "API_SERVICE"
service = "meetsmatch-api-dev"

# ── Production environment (deploy on release tag) ──
[env.production]
name = "meetsmatch-bot"
